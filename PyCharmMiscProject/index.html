<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Query Executor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SQL Query Executor</h1>
            <button id="darkModeToggle" class="dark-mode-toggle">🌙</button>
        </div>
        <div class="form-group">
            <label for="host">Host:</label>
            <input type="text" id="host" value="localhost">
        </div>
        <div class="form-group">
            <label for="port">Port:</label>
            <input type="number" id="port" value="3306">
        </div>
        <div class="form-group">
            <label for="user">User:</label>
            <input type="text" id="user" value="root">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password">
        </div>
        <div class="form-group">
            <label for="database">Database:</label>
            <input type="text" id="database">
        </div>
        <div class="form-group">
            <label for="sqlQuery">SQL Query:</label>
            <textarea id="sqlQuery" rows="5" placeholder="Enter your SQL query here..."></textarea>
        </div>
        <button id="executeBtn">Execute Query</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
